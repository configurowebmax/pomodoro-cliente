<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Pomodoro para Facturar a Clientes Gratis | ConfiguroWeb</title>
    <meta name="description" content="Temporizador Pomodoro con registro de tiempo facturable por cliente. Mide tu productividad y horas trabajadas gratis.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">
    <header class="border-b border-slate-800 sticky top-0 z-50 bg-slate-900/95 backdrop-blur">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-orange-500">Configuro<span class="text-slate-100">Web</span></span>
            <a href="https://configuroweb.com/tag/gratis" class="text-sm font-medium text-slate-400 hover:text-orange-500">← Apps Gratuitas</a>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-8 flex-grow w-full flex flex-col items-center">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold mb-2">Pomodoro para Clientes</h1>
            <p class="text-slate-400 text-sm">Mide tu tiempo de trabajo y regístralo para facturar.</p>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-8 w-full max-w-md text-center shadow-2xl">
            <div class="flex justify-center gap-2 mb-6">
                <button id="modeFocus" onclick="setMode('focus')" class="px-4 py-2 rounded-xl text-sm font-semibold bg-orange-600 text-white">Enfoque</button>
                <button id="modeBreak" onclick="setMode('break')" class="px-4 py-2 rounded-xl text-sm font-semibold bg-slate-700 text-slate-300">Descanso</button>
            </div>
            <div id="timerDisplay" class="text-7xl font-extrabold tabular-nums mb-6">25:00</div>
            <div class="flex justify-center gap-3">
                <button id="btnStart" onclick="toggleTimer()" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 px-8 rounded-2xl transition-colors cursor-pointer">Iniciar</button>
                <button onclick="resetTimer()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold py-3 px-8 rounded-2xl transition-colors cursor-pointer">Reset</button>
            </div>
            <div class="mt-6 pt-6 border-t border-slate-700">
                <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">Pomodoros completados</p>
                <p id="sessionCount" class="text-2xl font-bold text-emerald-400">0</p>
            </div>
        </div>

        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md mt-6">
            <h3 class="text-sm font-semibold mb-3">Registrar sesión facturable</h3>
            <form class="flex gap-2" onsubmit="event.preventDefault(); logSession();">
                <input type="text" id="clientName" placeholder="Nombre del cliente" class="flex-1 px-3 py-2 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-orange-500 text-slate-100">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold px-4 py-2 rounded-xl cursor-pointer">Registrar</button>
            </form>
            <div id="logList" class="mt-4 space-y-2 max-h-40 overflow-y-auto text-xs"></div>
        </div>
    </main>
    <footer class="border-t border-slate-800 mt-12">
        <div class="max-w-3xl mx-auto px-4 py-6 text-center text-xs text-slate-500">&copy; 2026 ConfiguroWeb.</div>
    </footer>
    <script>
        const K = 'cw_pomodoro_sessions';
        let mode = 'focus';
        let interval = null;
        let timeLeft = 25 * 60;
        let running = false;
        let sessions = JSON.parse(localStorage.getItem('cw_pomodoro_count')) || 0;
        document.getElementById('sessionCount').innerText = sessions;
        renderLog();

        function setMode(m) {
            mode = m;
            timeLeft = (m === 'focus' ? 25 : 5) * 60;
            stopTimer();
            updateDisplay();
            document.getElementById('modeFocus').className = m === 'focus' ? 'px-4 py-2 rounded-xl text-sm font-semibold bg-orange-600 text-white' : 'px-4 py-2 rounded-xl text-sm font-semibold bg-slate-700 text-slate-300';
            document.getElementById('modeBreak').className = m === 'break' ? 'px-4 py-2 rounded-xl text-sm font-semibold bg-sky-600 text-white' : 'px-4 py-2 rounded-xl text-sm font-semibold bg-slate-700 text-slate-300';
        }

        function toggleTimer() {
            running ? stopTimer() : startTimer();
        }

        function startTimer() {
            running = true;
            document.getElementById('btnStart').innerText = 'Pausar';
            interval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    stopTimer();
                    if (mode === 'focus') {
                        sessions++;
                        localStorage.setItem('cw_pomodoro_count', sessions);
                        document.getElementById('sessionCount').innerText = sessions;
                        alert('¡Pomodoro completado! Tómate 5 minutos de descanso.');
                        setMode('break');
                    } else {
                        alert('Descanso terminado. ¡Vamos de nuevo!');
                        setMode('focus');
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            running = false;
            clearInterval(interval);
            document.getElementById('btnStart').innerText = 'Iniciar';
        }

        function resetTimer() {
            stopTimer();
            setMode(mode);
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }

        function logSession() {
            const name = document.getElementById('clientName').value.trim();
            if (!name) return;
            let logs = JSON.parse(localStorage.getItem(K)) || [];
            logs.unshift({ name, date: new Date().toLocaleString('es-CO') });
            localStorage.setItem(K, JSON.stringify(logs));
            document.getElementById('clientName').value = '';
            renderLog();
        }

        function renderLog() {
            const logs = JSON.parse(localStorage.getItem(K)) || [];
            const list = document.getElementById('logList');
            if (logs.length === 0) { list.innerHTML = '<p class="text-center text-slate-500">Sin registros.</p>'; return; }
            list.innerHTML = logs.slice(0, 5).map(l => `<div class="flex justify-between bg-slate-900 p-2 rounded-lg"><span class="text-slate-300">${escapeHtml(l.name)}</span><span class="text-slate-500">${l.date}</span></div>`).join('');
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
